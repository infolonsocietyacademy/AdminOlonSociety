<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLON Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b1420;
--panel:#111c2e;
--soft:#16243a;
--line:#1f2f4a;
--text:#e6edf5;
--muted:#7c8ca5;
--gold:#e8b93f;
--green:#22c55e;
--red:#ef4444;
--radius:16px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:"DM Sans";
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:var(--panel);
padding:20px;
display:flex;
flex-direction:column;
border-right:1px solid var(--line);
}

.logo{
font-family:"Sora";
font-weight:800;
font-size:20px;
margin-bottom:30px;
}
.logo span{color:var(--gold)}

.menu a{
display:block;
padding:12px;
border-radius:10px;
color:var(--muted);
text-decoration:none;
margin-bottom:6px;
transition:.2s;
}
.menu a:hover{
background:var(--soft);
color:#fff;
}

/* MAIN */
.main{
flex:1;
padding:30px;
overflow:auto;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{
background:var(--soft);
border:none;
padding:10px 15px;
border-radius:10px;
color:#fff;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--panel);
padding:20px;
border-radius:var(--radius);
border:1px solid var(--line);
}

.card h3{
font-size:14px;
color:var(--muted);
}

.card strong{
font-size:22px;
color:var(--gold);
}

/* TABLE */
.table{
background:var(--panel);
border-radius:var(--radius);
overflow:hidden;
border:1px solid var(--line);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
text-align:left;
}

th{
background:var(--soft);
color:var(--gold);
font-size:12px;
}

td{
border-bottom:1px solid var(--line);
}

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.win{background:rgba(34,197,94,.2);color:var(--green)}
.lose{background:rgba(239,68,68,.2);color:var(--red)}

/* RESPONSIVE */
@media(max-width:900px){
.cards{grid-template-columns:1fr 1fr}
.sidebar{display:none}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Olon <span>Dashboard</span></div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Usuarios</a>
<a href="#">Referidos</a>
<a href="#">Ranking</a>
<a href="#">Pagos</a>
<a href="#">Settings</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<input class="search" placeholder="Buscar..." />
<div>👤 Admin</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Usuarios</h3>
<strong>1,248</strong>
</div>

<div class="card">
<h3>Referidos</h3>
<strong>856</strong>
</div>

<div class="card">
<h3>Ganancias</h3>
<strong>$12,540</strong>
</div>

<div class="card">
<h3>Win Rate</h3>
<strong>68%</strong>
</div>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Usuario</th>
<th>Trade</th>
<th>Resultado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody>
<tr>
<td>Erick</td>
<td>BUY XAUUSD</td>
<td><span class="status win">WIN</span></td>
<td>Hoy</td>
</tr>

<tr>
<td>Juan</td>
<td>SELL NAS100</td>
<td><span class="status lose">LOSS</span></td>
<td>Ayer</td>
</tr>

<tr>
<td>Maria</td>
<td>BUY EURUSD</td>
<td><span class="status win">WIN</span></td>
<td>Ayer</td>
</tr>

<tr>
<td>Carlos</td>
<td>SELL BTC</td>
<td><span class="status win">WIN</span></td>
<td>Hoy</td>
</tr>
</tbody>
</table>
</div>

</div>

</body>
</html>
