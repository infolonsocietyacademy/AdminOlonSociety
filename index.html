<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLON Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f5f7fb;
--sidebar:#07111f;
--card:#ffffff;
--text:#101828;
--muted:#667085;
--line:#e6ebf2;
--gold:#e8b93f;
--green:#16a34a;
--radius:20px;
--shadow:0 20px 40px rgba(0,0,0,.08);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Outfit;
background:var(--bg);
color:var(--text);
}

.app{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
background:linear-gradient(180deg,#07111f,#0d1f36);
color:#fff;
padding:20px;
}

.logo{
font-weight:900;
font-size:1.2rem;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
border-radius:10px;
margin-bottom:10px;
text-decoration:none;
color:#aaa;
font-weight:700;
}

.menu a:hover{
background:var(--gold);
color:#000;
}

/* MAIN */
.main{
padding:25px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{
padding:12px 16px;
border-radius:999px;
border:1px solid var(--line);
width:250px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.card h4{
color:var(--muted);
font-size:.8rem;
}

.card strong{
font-size:1.8rem;
display:block;
margin-top:5px;
}

/* TABLE */
.table{
background:#fff;
border-radius:var(--radius);
overflow:hidden;
box-shadow:var(--shadow);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid var(--line);
text-align:left;
}

th{
font-size:.7rem;
text-transform:uppercase;
color:var(--muted);
}

.status{
padding:5px 10px;
border-radius:999px;
font-size:.7rem;
font-weight:800;
}

.pending{background:#fff4cb;color:#8a6d00}
.accepted{background:#dcfce7;color:#166534}

.btn{
padding:8px 12px;
border:none;
border-radius:999px;
background:#07111f;
color:#fff;
font-weight:700;
cursor:pointer;
}

@media(max-width:900px){
.app{grid-template-columns:1fr}
.cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">OLON DASHBOARD</div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Solicitudes</a>
<a href="#">Aceptados</a>
<a href="#">WhatsApp</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<h2>Panel de Solicitudes</h2>
<input class="search" placeholder="Buscar...">
</div>

<!-- STATS -->
<div class="cards">
<div class="card"><h4>Total</h4><strong>120</strong></div>
<div class="card"><h4>Pendientes</h4><strong>32</strong></div>
<div class="card"><h4>Aceptados</h4><strong>70</strong></div>
<div class="card"><h4>VIP Leads</h4><strong>18</strong></div>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Experiencia</th>
<th>Capital</th>
<th>Estado</th>
<th></th>
</tr>
</thead>

<tbody>
<tr>
<td>Juan Morales</td>
<td>+1 787 000 0000</td>
<td>Básica</td>
<td>$500</td>
<td><span class="status pending">Pendiente</span></td>
<td><button class="btn">Ver</button></td>
</tr>

<tr>
<td>Ana Rivera</td>
<td>+1 407 000 0000</td>
<td>Intermedia</td>
<td>$1,000+</td>
<td><span class="status accepted">Aceptado</span></td>
<td><button class="btn">WhatsApp</button></td>
</tr>

</tbody>
</table>
</div>

</div>
</div>

</body>
</html>
