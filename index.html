<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLON Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#06080f;
  color:#f0f4ff;
}

h1,h2,h3,h4{
  font-family:'Syne', sans-serif;
  letter-spacing:-0.02em;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  text-align:left;
  font-size:12px;
  color:#8899b4;
  padding:10px;
}

.table td{
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.05);
}

.btn{
  background:#f0c040;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>OLON Dashboard</h1>

<div class="card">
  <h2>Estudiantes</h2>
  <table class="table">
    <tr>
      <th>Nombre</th>
      <th>Plan</th>
      <th>Estado</th>
    </tr>
    <tr>
      <td>Juan Perez</td>
      <td>VIP</td>
      <td>Activo</td>
    </tr>
  </table>
</div>

<div class="card">
  <h2>Resumen</h2>
  <p>Vista mensual / anual disponible</p>
  <button class="btn">Cambiar Vista</button>
</div>

</div>

</body>
</html>
