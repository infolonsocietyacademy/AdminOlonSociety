<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Overlay Full</title>

<style>
body{margin:0;font-family:Arial;background:#0c1120;color:#fff}
.app{display:flex}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100vh;
background:#111827;
transition:.3s;
z-index:20;
padding:20px;
}
.sidebar.open{left:0}

/* OVERLAY */
.mobile-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:19;
}
.mobile-overlay.show{display:block}

/* BUTTON */
.mobile-menu{
position:fixed;
top:20px;
left:20px;
width:40px;
height:40px;
border-radius:10px;
background:#1a2234;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:5px;
cursor:pointer;
z-index:21;
}
.mobile-menu span{
width:20px;
height:2px;
background:#fff;
transition:.3s;
}
.mobile-menu.active span:nth-child(1){
transform:translateY(6px) rotate(45deg);
}
.mobile-menu.active span:nth-child(2){
opacity:0;
}
.mobile-menu.active span:nth-child(3){
transform:translateY(-6px) rotate(-45deg);
}
</style>
</head>

<body>

<div class="mobile-menu" onclick="toggleMenu(this)">
<span></span>
<span></span>
<span></span>
</div>

<div class="mobile-overlay" onclick="toggleMenu()"></div>

<div class="sidebar">
<h2>Menú</h2>
<p>Dashboard</p>
<p>Estudiantes</p>
<p>Reportes</p>
</div>

<script>
function toggleMenu(btn){
const sidebar = document.querySelector('.sidebar')
const overlay = document.querySelector('.mobile-overlay')
const menuBtn = document.querySelector('.mobile-menu')

sidebar.classList.toggle('open')
overlay.classList.toggle('show')

if(btn){
btn.classList.toggle('active')
}else{
menuBtn.classList.remove('active')
}
}
</script>

</body>
</html>
