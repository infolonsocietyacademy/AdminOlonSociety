<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLON Society Academy | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f7f9fc;
--surface:#ffffff;
--surface2:#f1f4f9;
--border:#e4e8f0;
--text:#1a1d2b;
--muted:#6b7280;
--green:#10b981;
--red:#ef4444;
--yellow:#f59e0b;
--accent:#6366f1;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Outfit,sans-serif;
background:var(--bg);
color:var(--text);
padding:2rem;
}

header{
display:flex;
justify-content:space-between;
margin-bottom:2rem;
}

.logo{
font-family:'DM Serif Display',serif;
font-size:2rem;
}

.subtitle{
color:var(--muted);
font-size:.9rem;
}

.month-badge{
font-size:.8rem;
background:var(--surface2);
padding:8px 14px;
border-radius:20px;
}

.hero{
background:#fff;
border:1px solid var(--border);
border-radius:20px;
padding:1.5rem;
margin-bottom:1.5rem;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1rem;
margin-bottom:1.5rem;
}

.stat{
background:#fff;
border:1px solid var(--border);
border-radius:15px;
padding:1.2rem;
}

.stat-label{
font-size:.7rem;
color:var(--muted);
margin-bottom:5px;
}

.stat-value{
font-size:1.8rem;
font-weight:600;
}

.controls{
display:flex;
gap:10px;
margin-bottom:1rem;
flex-wrap:wrap;
}

.controls input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:#fff;
}

button{
cursor:pointer;
border-radius:10px;
padding:10px 15px;
border:1px solid var(--border);
background:#fff;
}

.add-btn{
background:var(--accent);
color:#fff;
border:none;
}

.table-wrap{
background:#fff;
border:1px solid var(--border);
border-radius:15px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:var(--surface2);
padding:15px;
font-size:.7rem;
text-align:left;
}

td{
padding:14px;
border-top:1px solid var(--border);
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:.7rem;
}

.activo{background:#dcfce7;color:#16a34a}
.pendiente{background:#fee2e2;color:#dc2626}
.parcial{background:#fef3c7;color:#d97706}

</style>
</head>

<body>

<header>
<div>
<div class="logo">OLON Society</div>
<div class="subtitle">Dashboard de miembros</div>
</div>
<div class="month-badge" id="monthBadge"></div>
</header>

<section class="hero">
<h2>Control de comunidad</h2>
<p>Administra estudiantes y pagos</p>
</section>

<div class="stats">
<div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0</div></div>
<div class="stat"><div class="stat-label">Activos</div><div class="stat-value" id="statActivos">0</div></div>
<div class="stat"><div class="stat-label">Pendientes</div><div class="stat-value" id="statPendientes">0</div></div>
</div>

<div class="controls">
<input type="text" id="searchInput" placeholder="Buscar..." oninput="renderTable()">
<button class="add-btn" onclick="add()">+ Agregar</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Plan</th>
<th>Monto</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>

let students=[
{name:'Carlos',plan:'VIP',amount:100,status:'activo'},
{name:'Luis',plan:'VIP',amount:100,status:'pendiente'}
];

function renderTable(){
let q=document.getElementById('searchInput').value.toLowerCase();
let list=students.filter(s=>s.name.toLowerCase().includes(q));

let html=list.map(s=>`
<tr>
<td>${s.name}</td>
<td>${s.plan}</td>
<td>$${s.amount}</td>
<td><span class="badge ${s.status}">${s.status}</span></td>
</tr>
`).join('');

document.getElementById('tableBody').innerHTML=html;

document.getElementById('statTotal').textContent=students.length;
document.getElementById('statActivos').textContent=students.filter(s=>s.status==='activo').length;
document.getElementById('statPendientes').textContent=students.filter(s=>s.status==='pendiente').length;
}

function add(){
students.push({name:'Nuevo',plan:'VIP',amount:100,status:'pendiente'});
renderTable();
}

renderTable();

</script>

</body>
</html>
